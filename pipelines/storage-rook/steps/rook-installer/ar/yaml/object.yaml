apiVersion: ceph.rook.io/v1
kind: CephObjectStore
metadata:
  name: cos-store
  namespace: rook-ceph
spec:
  metadataPool:
    failureDomain: host
    replicated:
      size: 3
  dataPool:
    failureDomain: host
    # For production it is recommended to use more chunks, such as 4+2 or 8+4
    erasureCoded:
      dataChunks: 4
      codingChunks: 2
    parameters:
      # Ceph Tentacle v20 has optimizations that need to be explicitly enabled
      allow_ec_optimizations: "true"
  preservePoolsOnDelete: true
  gateway:
    # sslCertificateRef:
    port: 80
    # securePort: 443
    instances: 3